<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#111113"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#a78bfa" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Glow orb -->
  <circle cx="600" cy="200" r="250" fill="url(#glow)"/>
  <!-- Badge -->
  <rect x="490" y="140" width="220" height="36" rx="18" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="600" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#a78bfa" letter-spacing="0.05em">ANNOUNCING v4.2</text>
  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-0.02em">Introducing</text>
  <text x="600" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="700" fill="url(#accent)" letter-spacing="-0.02em">CodeBuddy</text>
  <!-- Subtitle -->
  <text x="600" y="365" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#a1a1aa" letter-spacing="0.01em">The autonomous AI software engineer for your IDE</text>
  <!-- Feature pills -->
  <g transform="translate(600, 420)">
    <rect x="-380" y="-16" width="140" height="32" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="-310" y="5" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#d4d4d8">Multi-Agent</text>
    <rect x="-220" y="-16" width="120" height="32" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="-160" y="5" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#d4d4d8">27+ Tools</text>
    <rect x="-80" y="-16" width="160" height="32" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#d4d4d8">Self-Healing</text>
    <rect x="100" y="-16" width="150" height="32" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="175" y="5" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#d4d4d8">Local Models</text>
    <rect x="270" y="-16" width="110" height="32" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="325" y="5" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#d4d4d8">Open Source</text>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="596" width="1200" height="34" fill="rgba(139,92,246,0.08)"/>
  <text x="600" y="618" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#71717a" letter-spacing="0.04em">kod.dev</text>
</svg>
